name: Build Nmap Command Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Verify Electron files
        shell: bash
        run: |
          test -f electron/main.js
          test -f electron/preload.js
          test -f package.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ runner.os }}
          path: build
